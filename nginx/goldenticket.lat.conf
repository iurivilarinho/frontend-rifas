# Redirect HTTP -> HTTPS
server {
    listen 80;
    server_name goldenticket.lat www.goldenticket.lat;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name goldenticket.lat www.goldenticket.lat;

    ssl_certificate     /etc/nginx/ssl/goldenticket.lat/cert.pem;
    ssl_certificate_key /etc/nginx/ssl/goldenticket.lat/privkey.key;

    root /var/www/goldenticket.lat;
    index index.html;

    # =============== arranhacel (jÃ¡ existente) ===============
    location = /arranhacel { return 301 /arranhacel/; }
    location /arranhacel/ {
        alias /var/www/arranhacel/;
        try_files $uri $uri/ /arranhacel/index.html;
    }

    # =============== ZIL (Comandas) ===============
    location = /zil { return 301 /zil/; }
    location /zil/ {
        alias /var/www/command/;
        try_files $uri $uri/ /zil/index.html;

        # runtime-config.js nunca pode ser cacheado (define qual API o tenant usa)
        location = /zil/runtime-config.js {
            alias /var/www/command/runtime-config.js;
            add_header Cache-Control "no-store, no-cache, must-revalidate" always;
            add_header Pragma "no-cache" always;
        }
    }
    location /zil-api/ {
        proxy_pass https://127.0.0.1:9091/;
        proxy_ssl_verify off;
        proxy_ssl_server_name on;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        client_max_body_size 50m;
    }

    # =============== JANTINHA-FAMILIA (Comandas) ===============
    location = /jantinha-familia { return 301 /jantinha-familia/; }
    location /jantinha-familia/ {
        alias /var/www/command-jnt-fml/;
        try_files $uri $uri/ /jantinha-familia/index.html;

        location = /jantinha-familia/runtime-config.js {
            alias /var/www/command-jnt-fml/runtime-config.js;
            add_header Cache-Control "no-store, no-cache, must-revalidate" always;
            add_header Pragma "no-cache" always;
        }
    }
    location /jantinha-familia-api/ {
        proxy_pass https://127.0.0.1:9092/;
        proxy_ssl_verify off;
        proxy_ssl_server_name on;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        client_max_body_size 50m;
    }

    # Landing page raiz
    location / {
        try_files $uri $uri/ /index.html;
    }
}